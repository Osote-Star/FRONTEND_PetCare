<div class="panel-right">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="auth-card">

    <!-- Header -->
    <div class="card-header">
      <h3>Nueva contraseña</h3>
      <div class="accent-line"></div>
      <p>Ingresa tu nueva contraseña</p>
    </div>

    <form (ngSubmit)="submit()" #form="ngForm">

      <!-- Password -->
      <div class="field">
        <label>Nueva contraseña</label>
        <div class="input-wrap">
          <input
            type="password"
            name="password"
            [(ngModel)]="newPassword"
            placeholder="••••••••"
            required
          />
        </div>
      </div>

      <!-- Confirm -->
      <div class="field">
        <label>Confirmar contraseña</label>
        <div class="input-wrap">
          <input
            type="password"
            name="confirm"
            [(ngModel)]="confirmPassword"
            placeholder="••••••••"
            required
          />
        </div>
      </div>

      <!-- Error -->
      <div class="alert-error" *ngIf="error()">
        {{ error() }}
      </div>
      <div class="alert-success" *ngIf="message">
        {{ message }}
      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="btn-submit"
        [disabled]="!form.valid || isLoading() || Enviado()"
      >
        <div class="spinner" *ngIf="isLoading()"></div>
        <span *ngIf="!isLoading() && !Enviado()">Actualizar contraseña</span>
        <span *ngIf="isLoading()">Actualizando...</span>
        <span *ngIf="Enviado()">Completado...</span>
      </button>

    </form>

  </div>
</div>
