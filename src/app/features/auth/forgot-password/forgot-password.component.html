<div class="panel-right">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="auth-card">

    <!-- Header -->
    <div class="card-header">
      <h3>Recuperar contraseña</h3>
      <div class="accent-line"></div>
      <p>Ingresa tu correo para recibir instrucciones</p>
    </div>

    <form (ngSubmit)="submit()" #form="ngForm">

      <!-- Email -->
      <div class="field">
        <label>Correo electrónico</label>
        <div class="input-wrap">
          <input
            type="email"
            name="email"
            [(ngModel)]="email"
            placeholder="correo@ejemplo.com"
            required
          />
        </div>
      </div>

      <!-- Success -->
      <div class="alert-success" *ngIf="message">
        {{ message }}
      </div>

      <!-- Error -->
      <div class="alert-error" *ngIf="error()">
        {{ error() }}
      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="btn-submit"
        [disabled]="!form.valid || isLoading() || Enviado()"
      >
        <div class="spinner" *ngIf="isLoading()"></div>
        <span *ngIf="!isLoading() && !Enviado()">Enviar enlace</span>
        <span *ngIf="isLoading()">Enviando...</span>
        <span *ngIf="Enviado()">Ya puede salir de esta pantalla</span>
      </button>

    </form>

    <div class="card-footer">
      <a href="/login">Volver al login</a>
    </div>

  </div>
</div>
