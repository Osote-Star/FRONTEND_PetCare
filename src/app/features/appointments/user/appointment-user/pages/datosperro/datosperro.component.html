<div class="progress-header">
    <div class="step-badge">2</div>

    <div class="step-info">
      <small>Cnociento a tu mascota</small>
      <h2>Datos de tu mascota</h2>
    </div>
    <div class="divider"></div>

    <div class="header-actions">
      <button class="btn btn-back" (click)="atras()">← Atrás</button>
      <button class="btn btn-next" (click)="siguiente()">Siguiente →</button>
    </div>
    
    <div class="divider"></div>

    <div class="steps-dots">
      <div class="dot done"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

<!-- MAIN -->
<main>
  <div class="card">
    <h1 class="card-title">¿Quién viene a la consulta?</h1>
    <p class="card-subtitle">Cuéntanos sobre tu compañero peludo</p>

    <!-- AVATAR UPLOAD -->
    <div class="pet-avatar-section">
      <div class="avatar-circle">🐕</div>
      <div class="avatar-text">
        <h4>Agrega una foto de tu mascota</h4>
        <p>JPG o PNG, máximo 5MB — opcional pero adorable 🌿</p>
      </div>
    </div>

    <!-- ESPECIE -->
    <div class="form-group" style="margin-bottom: 16px;">
      <label class="form-label">Especie <span class="required">*</span></label>
      <div class="species-options">
        <div class="species-chip active" onclick="selectChip(this, 'species')">🐶 Perro</div>
        <div class="species-chip" onclick="selectChip(this, 'species')">🐱 Gato</div>
        <div class="species-chip" onclick="selectChip(this, 'species')">🐰 Conejo</div>
        <div class="species-chip" onclick="selectChip(this, 'species')">🐦 Ave</div>
        <div class="species-chip" onclick="selectChip(this, 'species')">🦎 Otro</div>
      </div>
    </div>

    <!-- NOMBRE + RAZA -->
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Nombre <span class="required">*</span></label>
        <input type="text" class="form-input" placeholder="Ej: Toby, Luna...">
      </div>
      <div class="form-group">
        <label class="form-label">Raza <span class="required">*</span></label>
        <div class="select-wrapper">
          <select class="form-select">
            <option value="" disabled selected>Selecciona raza</option>
            <option>Labrador</option>
            <option>Golden Retriever</option>
            <option>Bulldog Francés</option>
            <option>Chihuahua</option>
            <option>Beagle</option>
            <option>Poodle</option>
            <option>Mestizo / Sin raza definida</option>
          </select>
        </div>
      </div>
    </div>

    <!-- EDAD + PESO -->
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Edad</label>
        <div class="select-wrapper">
          <select class="form-select">
            <option value="" disabled selected>Selecciona</option>
            <option>Cachorro (0–6 meses)</option>
            <option>Joven (6m – 1 año)</option>
            <option>Adulto (1 – 7 años)</option>
            <option>Senior (7+ años)</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Peso aproximado</label>
        <input type="text" class="form-input" placeholder="Ej: 8 kg">
      </div>
    </div>

    <!-- GÉNERO -->
    <div class="form-group" style="margin-bottom: 16px;">
      <label class="form-label">Sexo <span class="required">*</span></label>
      <div class="gender-options">
        <button class="gender-btn active" onclick="selectGender(this)">♂ Macho</button>
        <button class="gender-btn" onclick="selectGender(this)">♀ Hembra</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- SALUD -->
    <div class="section-label">Historial de salud</div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">¿Está vacunado?</label>
        <div class="gender-options">
          <button class="gender-btn active" onclick="selectGender(this)">✔ Sí</button>
          <button class="gender-btn" onclick="selectGender(this)">✘ No</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">¿Está esterilizado?</label>
        <div class="gender-options">
          <button class="gender-btn" onclick="selectGender(this)">✔ Sí</button>
          <button class="gender-btn active" onclick="selectGender(this)">✘ No</button>
        </div>
      </div>
    </div>

    <div class="form-row full" style="margin-top: 4px;">
      <div class="form-group">
        <label class="form-label">Alergias o condiciones especiales</label>
        <input type="text" class="form-input" placeholder="Ej: alergia a penicilina, hipotiroidismo...">
      </div>
    </div>

  </div>
</main>

<script>
  function selectGender(btn) {
    const siblings = btn.parentElement.querySelectorAll('.gender-btn');
    siblings.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function selectChip(chip, group) {
    const siblings = chip.parentElement.querySelectorAll('.species-chip');
    siblings.forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
  }
</script>
