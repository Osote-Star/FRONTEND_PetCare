<section class="result-section">
  <div class="container-fluid g-0">
    <div class="row g-0 min-vh-100 align-items-center">

      <!-- Izquierda — Imagen -->
      <div class="col-lg-6 img-col position-relative">
        <img [src]="imagenSeleccionada" 
             class="w-100 hero-img" 
             alt="Mascota feliz">
        <div class="hero-overlay"></div>
      </div>

      <!-- Derecha — Animación + Mensaje -->
      <div class="col-lg-6 msg-col d-flex align-items-center justify-content-center py-5">
        <div class="result-card rounded-4 p-5 w-100">

          <!-- Cargando -->
          <div *ngIf="cargando" class="text-center">
            <div class="spinner-border text-moss mb-4" style="width:3rem;height:3rem;"></div>
            <h4 class="fw-bold text-bark">Confirmando tu donación...</h4>
            <p class="text-muted">Por favor espera un momento</p>
          </div>

          <!-- Éxito -->
          <div *ngIf="!cargando && exito">
            <div class="lottie-wrapper mb-3">
              <ng-lottie [options]="animacionOptions"></ng-lottie>
            </div>
            <span class="section-label d-flex align-items-center gap-2 mb-3">
              <span class="label-line"></span>Donación completada
            </span>
            <h2 class="fw-bold text-bark mb-3">¡Gracias por tu donación!</h2>
            <p class="hero-desc mb-4">
              Tu donación de <strong class="text-moss">${{ monto }} MXN</strong> fue procesada exitosamente.
              Tu generosidad ayuda a mejorar la vida de muchas mascotas. 🐾
            </p>
            <div class="impact-badge rounded-3 px-4 py-3 mb-4 d-flex align-items-center gap-2">
              <i class="bi bi-heart-fill text-moss"></i>
              <span class="fw-semibold text-bark small">Tu aporte hace la diferencia</span>
            </div>
            <button class="btn btn-donate w-100 py-3 fw-bold rounded-3" (click)="volverInicio()">
              <i class="bi bi-house-fill me-2"></i>Volver al inicio
            </button>
          </div>

          <!-- Error -->
          <div *ngIf="!cargando && !exito">
            <div class="result-icon error-icon mb-4 rounded-circle d-flex align-items-center justify-content-center">
              <i class="bi bi-x-lg text-white"></i>
            </div>
            <h2 class="fw-bold text-bark mb-2">Algo salió mal</h2>
            <p class="text-muted mb-4">{{ errorMsg }}</p>
            <button class="btn btn-donate w-100 py-3 fw-bold rounded-3" (click)="volverInicio()">
              <i class="bi bi-arrow-left me-2"></i>Intentar de nuevo
            </button>
          </div>

        </div>
      </div>

    </div>
  </div>
</section>
